<article class="flex flex-col bg-white rounded-md w-full overflow-hidden text-black">
    <div>
        <img src="{{ news_item.image_url }}" alt="{{ news_item.title }}">
    </div>
    <div class="flex flex-col flex-1 justify-between gap-2 p-2.5 sm:p-3 md:p-3.5 lg:p-4">
        <div>
            <h3 class="font-bold text-primary text-sm">{{ news_item.title }}</h3>
        </div>
        <div class="hidden sm:flex sm:flex-col gap-0.5 w-full font-medium text-xs">
            <p class="whitespace-nowrap">{{ news_item.author }}</p>
            <p class="text-primary-light whitespace-nowrap">{{ news_item.published_at }}</p>
        </div>
    </div>
</article>
