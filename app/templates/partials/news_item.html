<a href="{{ news_item.link }}"
   target="_blank"
   rel="noopener noreferrer">
    <article class="flex flex-col bg-white rounded-md h-full overflow-hidden text-black hover:scale-102 transition-transform">
        <img src="{{ news_item.image_url }}"
             alt="{{ news_item.title }}"
             class="w-full object-cover aspect-[16/9]">
        <div class="flex flex-col flex-1 justify-between gap-2 p-2.5 sm:p-3 md:p-3.5 lg:p-4">
            <h3 class="font-bold text-primary text-sm">{{ news_item.title }}</h3>
            <div class="hidden sm:flex flex-col gap-0.5 w-full font-medium text-xs">
                <p class="truncate">{{ news_item.author }}</p>
                <p class="text-primary-light truncate">{{ news_item.published_at }}</p>
            </div>
        </div>
    </article>
</a>
