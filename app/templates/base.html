<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Homebase
            {% block title %}
            {% endblock title %}
        </title>
        <link rel="stylesheet"
              href="{{ url_for('static', filename='css/styles.css') }}">
    </head>
    <body class="flex flex-col bg-primary min-h-screen font-sans text-white">
        <header class="w-full">
            <nav class="flex justify-between items-center mx-auto px-8 py-4 w-full max-w-[1500px]">
                <a href="/" class="font-bold text-2xl">
                    <img src="{{ url_for('static', filename='images/homebase-logo.png') }}"
                         alt="Homebase Logo"
                         class="w-auto h-8">
                </a>
                <div class="flex gap-8">
                    <a href="/standings">Standings</a>
                    <p href="/teams">Teams</p>
                    <a href="/leaderboard">Leaders</a>
                </div>
            </nav>
        </header>
        <main class="flex-1 w-full">
            {% block content %}
            {% endblock content %}
        </main>
    </body>
</html>
